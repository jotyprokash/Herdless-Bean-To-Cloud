apiVersion: apps/v1
kind: Deployment
metadata:
  name: herdless-web
  namespace: default
  labels:
    app: herdless-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: herdless-web
  template:
    metadata:
      labels:
        app: herdless-web
    spec:
      containers:
      - name: web
        image: <ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/herdless-app-prod:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: herdless-secrets
              key: database-url
        - name: NEXT_PUBLIC_SITE_URL
          value: "https://herdlesscoffee.com"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 5
